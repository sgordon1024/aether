<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 540" width="1280" height="540" role="img" aria-label="Aether — interactive generative art, in code">
  <defs>
    <radialGradient id="bg" cx="68%" cy="34%" r="85%">
      <stop offset="0%" stop-color="#141a30"/>
      <stop offset="55%" stop-color="#0a0c18"/>
      <stop offset="100%" stop-color="#04050a"/>
    </radialGradient>
    <linearGradient id="disk" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#3a0d08"/>
      <stop offset="22%" stop-color="#b8401a"/>
      <stop offset="42%" stop-color="#ff9a44"/>
      <stop offset="52%" stop-color="#fff3d6"/>
      <stop offset="60%" stop-color="#eaf2ff"/>
      <stop offset="80%" stop-color="#ff8a3c"/>
      <stop offset="100%" stop-color="#5a140a"/>
    </linearGradient>
    <linearGradient id="aurora" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1bd17e" stop-opacity="0"/>
      <stop offset="30%" stop-color="#1bd17e"/>
      <stop offset="60%" stop-color="#19b3c9"/>
      <stop offset="100%" stop-color="#7a5cff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7fecff"/>
      <stop offset="50%" stop-color="#b69cff"/>
      <stop offset="100%" stop-color="#ff93d2"/>
    </linearGradient>
    <linearGradient id="streak" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6fe7ff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#9fb4ff"/>
      <stop offset="100%" stop-color="#ff9ad6" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="holeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd9a0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffd9a0" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
  </defs>

  <!-- deep space -->
  <rect width="1280" height="540" fill="url(#bg)"/>

  <!-- aurora ribbons -->
  <g filter="url(#soft)" opacity="0.35">
    <path d="M -40 120 C 240 60, 520 180, 820 96 S 1320 130, 1340 96" fill="none" stroke="url(#aurora)" stroke-width="30"/>
    <path d="M -40 168 C 300 120, 560 230, 880 150 S 1300 196, 1340 150" fill="none" stroke="url(#aurora)" stroke-width="16" opacity="0.7"/>
  </g>

  <!-- particle / flow streaks -->
  <g opacity="0.5" filter="url(#soft)" fill="none" stroke="url(#streak)" stroke-width="2">
    <path d="M 120 430 C 360 360, 620 470, 900 380"/>
    <path d="M 80 470 C 380 420, 680 520, 1040 430"/>
    <path d="M 220 400 C 460 340, 700 430, 980 350"/>
  </g>

  <!-- starfield -->
  <g fill="#ffffff">
    <circle cx="1180" cy="70" r="1.6" opacity="0.9"/>
    <circle cx="1110" cy="140" r="1.0" opacity="0.6"/>
    <circle cx="1235" cy="180" r="1.3" opacity="0.8"/>
    <circle cx="1040" cy="60" r="0.9" opacity="0.5"/>
    <circle cx="980" cy="120" r="1.1" opacity="0.7"/>
    <circle cx="860" cy="50" r="1.4" opacity="0.85"/>
    <circle cx="760" cy="90" r="0.8" opacity="0.5"/>
    <circle cx="1200" cy="300" r="1.0" opacity="0.6"/>
    <circle cx="1130" cy="360" r="1.5" opacity="0.85"/>
    <circle cx="1245" cy="420" r="0.9" opacity="0.55"/>
    <circle cx="1075" cy="450" r="1.2" opacity="0.7"/>
    <circle cx="1230" cy="500" r="1.0" opacity="0.6"/>
    <circle cx="690" cy="470" r="0.9" opacity="0.5"/>
    <circle cx="560" cy="500" r="1.1" opacity="0.6"/>
    <circle cx="430" cy="120" r="0.8" opacity="0.45"/>
    <circle cx="300" cy="80" r="1.0" opacity="0.55"/>
    <circle cx="180" cy="150" r="0.9" opacity="0.5"/>
    <circle cx="90" cy="250" r="1.1" opacity="0.6"/>
    <circle cx="1000" cy="470" r="0.8" opacity="0.45"/>
    <circle cx="930" cy="430" r="1.0" opacity="0.6"/>
  </g>

  <!-- black hole: Event Horizon motif -->
  <g transform="translate(965 250)">
    <!-- outer warm glow -->
    <circle cx="0" cy="0" r="240" fill="url(#holeGlow)"/>
    <!-- lensed far side arcing over the top -->
    <path d="M -212 6 C -150 -150, 150 -150, 212 6" fill="none" stroke="url(#disk)" stroke-width="16" opacity="0.9" filter="url(#soft)"/>
    <!-- accretion disk (front) -->
    <ellipse cx="0" cy="6" rx="212" ry="50" fill="url(#disk)" opacity="0.96" filter="url(#glow)"/>
    <ellipse cx="0" cy="6" rx="212" ry="50" fill="url(#disk)" opacity="0.85"/>
    <!-- event horizon -->
    <circle cx="0" cy="0" r="60" fill="#02030a"/>
    <!-- photon ring -->
    <circle cx="0" cy="0" r="62" fill="none" stroke="#ffeccb" stroke-width="2.5" opacity="0.95" filter="url(#soft)"/>
    <circle cx="0" cy="0" r="62" fill="none" stroke="#fff6e6" stroke-width="1.2" opacity="0.9"/>
    <!-- lensed near side arcing under -->
    <path d="M -150 24 C -90 96, 90 96, 150 24" fill="none" stroke="url(#disk)" stroke-width="9" opacity="0.8" filter="url(#soft)"/>
  </g>

  <!-- wordmark -->
  <text x="92" y="300" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="132" font-weight="700" letter-spacing="2" fill="url(#title)">Aether</text>
  <text x="98" y="348" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="25" font-weight="400" letter-spacing="6" fill="#aeb9cc" opacity="0.92">INTERACTIVE GENERATIVE ART — IN CODE</text>

  <!-- piece list -->
  <text x="98" y="475" font-family="'SF Mono', 'Menlo', monospace" font-size="14.5" letter-spacing="1" fill="#6f7d94">water · fire · wind · earth · sky · coral · mycelium · stardust</text>
  <text x="98" y="498" font-family="'SF Mono', 'Menlo', monospace" font-size="14.5" letter-spacing="1" fill="#6f7d94">ink · mandelbulb · event horizon · genesis</text>
</svg>
